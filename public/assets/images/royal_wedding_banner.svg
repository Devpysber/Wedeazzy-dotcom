<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 120" width="100%" height="100%">
  <!-- Background -->
  <rect width="1600" height="120" fill="#58080a" />
  
  <!-- Subtle background texture (delicate arches/mandala patterns repeating) -->
  <g opacity="0.08" fill="#d4af37">
    <!-- A repeating background pattern of arches -->
    <path d="M 0,120 C 50,80 150,80 200,120 M 200,120 C 250,80 350,80 400,120 M 400,120 C 450,80 550,80 600,120 M 600,120 C 650,80 750,80 800,120 M 800,120 C 850,80 950,80 1000,120 M 1000,120 C 1050,80 1150,80 1200,120 M 1200,120 C 1250,80 1350,80 1400,120 M 1400,120 C 1450,80 1550,80 1600,120" stroke="#d4af37" stroke-width="1" fill="none" />
  </g>
  
  <!-- Gold borders -->
  <rect x="0" y="0" width="1600" height="120" fill="none" stroke="#d4af37" stroke-width="4" />
  <line x1="0" y1="8" x2="1600" y2="8" stroke="#d4af37" stroke-width="1" stroke-dasharray="5,5" />
  <line x1="0" y1="112" x2="1600" y2="112" stroke="#d4af37" stroke-width="1" stroke-dasharray="5,5" />

  <!-- LEFT CORNER MANDALA DECORATION -->
  <g transform="translate(40, 60) scale(0.65)" stroke="#d4af37" stroke-width="1" fill="none">
    <circle cx="0" cy="0" r="60" stroke-width="1.5" />
    <circle cx="0" cy="0" r="50" />
    <circle cx="0" cy="0" r="35" stroke-dasharray="3,3" />
    <circle cx="0" cy="0" r="20" />
    <!-- Petals -->
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(30)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(60)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(90)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(120)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(150)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(180)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(210)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(240)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(270)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(300)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(330)" />
  </g>

  <!-- RIGHT CORNER MANDALA DECORATION -->
  <g transform="translate(1560, 60) scale(0.65)" stroke="#d4af37" stroke-width="1" fill="none">
    <circle cx="0" cy="0" r="60" stroke-width="1.5" />
    <circle cx="0" cy="0" r="50" />
    <circle cx="0" cy="0" r="35" stroke-dasharray="3,3" />
    <circle cx="0" cy="0" r="20" />
    <!-- Petals -->
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(30)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(60)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(90)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(120)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(150)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(180)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(210)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(240)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(270)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(300)" />
    <path d="M 0,0 C -8,-15 -8,-30 0,-45 C 8,-30 8,-15 0,0" fill="#d4af37" opacity="0.3" transform="rotate(330)" />
  </g>

  <!-- LEFT MAJESTIC ELEPHANT -->
  <g transform="translate(140, 15) scale(0.8)">
    <!-- Elephant Silhouette in gold -->
    <path d="M 30,80 C 30,45 55,25 90,25 C 105,25 120,30 128,40 C 135,38 145,40 150,45 C 155,50 162,52 170,48 C 175,45 180,45 180,50 C 180,58 172,66 164,66 C 160,66 156,62 152,58 C 147,70 135,78 130,78 C 130,92 122,96 118,96 L 108,96 L 112,78 L 95,78 L 91,96 L 81,96 L 85,78 C 72,78 64,78 55,78 L 51,96 L 41,96 L 45,78 L 35,78 L 31,96 L 21,96 L 25,82 C 20,78 25,65 25,56 C 25,50 20,60 18,65 L 15,55 C 22,45 30,55 30,80 Z" fill="#d4af37" />
    <!-- Tusk -->
    <path d="M 148,60 C 155,62 160,60 162,56 C 158,56 152,57 148,60 Z" fill="#ffffff" />
    <!-- Decorative Rug (Jhull) with cutout effect -->
    <path d="M 55,40 C 65,35 95,35 105,40 C 110,50 110,65 105,70 C 95,74 65,74 55,70 C 50,65 50,50 55,40 Z" fill="#58080a" stroke="#d4af37" stroke-width="1.5" />
    <!-- Rug Ornaments -->
    <circle cx="65" cy="55" r="2.5" fill="#d4af37" />
    <circle cx="80" cy="55" r="2.5" fill="#d4af37" />
    <circle cx="95" cy="55" r="2.5" fill="#d4af37" />
    <path d="M 60,65 L 100,65" stroke="#d4af37" stroke-width="1" stroke-dasharray="2,2" />
    <!-- Howdah (Seat on top) -->
    <path d="M 70,25 L 90,25 L 95,12 L 80,5 L 65,12 Z" fill="#d4af37" />
    <path d="M 70,25 L 90,25 L 88,20 L 72,20 Z" fill="#58080a" />
    <circle cx="80" cy="15" r="2" fill="#d4af37" />
    <!-- Rider (Mahout) holding staff -->
    <circle cx="112" cy="30" r="4.5" fill="#d4af37" />
    <path d="M 112,34 C 110,38 108,44 114,48 L 120,40 Z" fill="#d4af37" />
    <line x1="108" y1="28" x2="116" y2="48" stroke="#d4af37" stroke-width="1.5" />
    <!-- Lotus held by trunk -->
    <path d="M 178,44 C 176,38 184,34 184,34 C 184,34 192,38 190,44 C 186,48 182,48 178,44 Z" fill="#d4af37" />
    <line x1="180" y1="48" x2="184" y2="40" stroke="#d4af37" stroke-width="1" />
  </g>

  <!-- RIGHT MAJESTIC ELEPHANT (Mirrored) -->
  <g transform="translate(1460, 15) scale(0.8) scale(-1, 1)">
    <!-- Elephant Silhouette in gold -->
    <path d="M 30,80 C 30,45 55,25 90,25 C 105,25 120,30 128,40 C 135,38 145,40 150,45 C 155,50 162,52 170,48 C 175,45 180,45 180,50 C 180,58 172,66 164,66 C 160,66 156,62 152,58 C 147,70 135,78 130,78 C 130,92 122,96 118,96 L 108,96 L 112,78 L 95,78 L 91,96 L 81,96 L 85,78 C 72,78 64,78 55,78 L 51,96 L 41,96 L 45,78 L 35,78 L 31,96 L 21,96 L 25,82 C 20,78 25,65 25,56 C 25,50 20,60 18,65 L 15,55 C 22,45 30,55 30,80 Z" fill="#d4af37" />
    <!-- Tusk -->
    <path d="M 148,60 C 155,62 160,60 162,56 C 158,56 152,57 148,60 Z" fill="#ffffff" />
    <!-- Decorative Rug (Jhull) with cutout effect -->
    <path d="M 55,40 C 65,35 95,35 105,40 C 110,50 110,65 105,70 C 95,74 65,74 55,70 C 50,65 50,50 55,40 Z" fill="#58080a" stroke="#d4af37" stroke-width="1.5" />
    <!-- Rug Ornaments -->
    <circle cx="65" cy="55" r="2.5" fill="#d4af37" />
    <circle cx="80" cy="55" r="2.5" fill="#d4af37" />
    <circle cx="95" cy="55" r="2.5" fill="#d4af37" />
    <path d="M 60,65 L 100,65" stroke="#d4af37" stroke-width="1" stroke-dasharray="2,2" />
    <!-- Howdah (Seat on top) -->
    <path d="M 70,25 L 90,25 L 95,12 L 80,5 L 65,12 Z" fill="#d4af37" />
    <path d="M 70,25 L 90,25 L 88,20 L 72,20 Z" fill="#58080a" />
    <circle cx="80" cy="15" r="2" fill="#d4af37" />
    <!-- Rider (Mahout) holding staff -->
    <circle cx="112" cy="30" r="4.5" fill="#d4af37" />
    <path d="M 112,34 C 110,38 108,44 114,48 L 120,40 Z" fill="#d4af37" />
    <line x1="108" y1="28" x2="116" y2="48" stroke="#d4af37" stroke-width="1.5" />
    <!-- Lotus held by trunk -->
    <path d="M 178,44 C 176,38 184,34 184,34 C 184,34 192,38 190,44 C 186,48 182,48 178,44 Z" fill="#d4af37" />
    <line x1="180" y1="48" x2="184" y2="40" stroke="#d4af37" stroke-width="1" />
  </g>

  <!-- CENTER UDAIPUR PALACE SILHOUETTE (BACKGROUND) -->
  <g transform="translate(800, 20) scale(0.85)" opacity="0.2" fill="#d4af37">
    <!-- Main Palace Building Structure -->
    <rect x="-120" y="30" width="240" height="50" />
    <rect x="-150" y="45" width="300" height="35" />
    <rect x="-80" y="10" width="160" height="20" />
    
    <!-- Central Large Dome (Chhatri) -->
    <path d="M -25,10 L -25,-10 C -25,-25 -8,-32 0,-45 C 8,-32 25,-25 25,-10 L 25,10 Z" />
    <line x1="0" y1="-45" x2="0" y2="-55" stroke="#d4af37" stroke-width="2" />
    <circle cx="0" cy="-56" r="2" />
    
    <!-- Medium Domes (Left & Right) -->
    <path d="M -65,10 L -65,-5 C -65,-18 -55,-22 -50,-32 C -45,-22 -35,-18 -35,-5 L -35,10 Z" />
    <path d="M 35,10 L 35,-5 C 35,-18 45,-22 50,-32 C 55,-22 65,-18 65,-5 L 65,10 Z" />
    
    <!-- Small Domes (Outer sides) -->
    <path d="M -105,30 L -105,15 C -105,5 -98,0 -95,-10 C -92,0 -85,5 -85,15 L -85,30 Z" />
    <path d="M 85,30 L 85,15 C 85,5 92,0 95,-10 C 98,0 105,5 105,15 L 105,30 Z" />
    
    <path d="M -135,45 L -135,35 C -135,28 -130,25 -127,18 C -124,25 -119,28 -119,35 L -119,45 Z" />
    <path d="M 119,45 L 119,35 C 119,28 124,25 127,18 C 130,25 135,28 135,35 L 135,45 Z" />
    
    <!-- Palace Arches Details (negative spaces) -->
    <g fill="#58080a">
      <path d="M -15,80 C -15,65 -5,60 0,60 C 5,60 15,65 15,80 Z" />
      <path d="M -45,80 C -45,70 -40,65 -35,65 C -30,65 -25,70 -25,80 Z" />
      <path d="M 25,80 C 25,70 30,65 35,65 C 40,65 45,70 45,80 Z" />
      <path d="M -75,80 C -75,72 -70,68 -65,68 C -60,68 -55,72 -55,80 Z" />
      <path d="M 55,80 C 55,72 60,68 65,68 C 70,68 75,72 75,80 Z" />
      
      <!-- Upper Windows -->
      <rect x="-15" y="18" width="8" height="12" rx="3" />
      <rect x="7" y="18" width="8" height="12" rx="3" />
      <rect x="-55" y="18" width="8" height="12" rx="3" />
      <rect x="47" y="18" width="8" height="12" rx="3" />
    </g>
  </g>

  <!-- CENTER DOLI PROCESSION (FOREGROUND) -->
  <g transform="translate(640, 52) scale(0.9)" fill="#d4af37">
    <!-- Traditional Bridal Doli (Palanquin) -->
    <g transform="translate(120, 10)">
      <!-- Carrying Poles -->
      <rect x="-90" y="-2" width="180" height="4" rx="2" />
      <!-- Doli Base -->
      <path d="M -30,18 L 30,18 L 24,-5 L -24,-5 Z" />
      <!-- Doli Pillars -->
      <rect x="-22" y="-5" width="3" height="15" />
      <rect x="19" y="-5" width="3" height="15" />
      <rect x="-10" y="-5" width="2" height="15" />
      <rect x="8" y="-5" width="2" height="15" />
      <!-- Doli Roof/Dome -->
      <path d="M -26,-5 C -26,-20 -10,-24 0,-24 C 10,-24 26,-20 26,-5 Z" />
      <!-- Small crown on doli roof -->
      <path d="M -6,-24 L 6,-24 L 0,-30 Z" />
      <circle cx="0" cy="-31" r="1.5" />
      <!-- Bride silhouette sitting inside (subtle) -->
      <circle cx="-1" cy="5" r="4" />
      <path d="M -5,9 C -2,9 2,9 4,12 L -6,15 Z" />
      <!-- Doli Curtains hanging (cutout details) -->
      <path d="M -22,-5 L -22,12 L -15,12 L -15,-5 Z M 19,-5 L 19,12 L 12,12 L 12,-5 Z" fill="#58080a" />
    </g>

    <!-- Attendants carrying the Doli (Procession) -->
    <!-- Bearer 1 (Front Right) -->
    <g transform="translate(225, 20)">
      <circle cx="0" cy="-24" r="5" />
      <!-- Traditional Turban (Pagri) shape -->
      <path d="M -6,-26 C -6,-30 6,-30 6,-26 C 3,-28 -3,-28 -0,-26 Z" />
      <!-- Body -->
      <path d="M -5,-18 C -7,-18 7,-18 5,-18 L 8,12 L 4,12 L 2,0 L -1,18 L -5,18 L -3,0 L -5,12 L -9,12 Z" />
      <!-- Arm holding pole -->
      <path d="M -5,-12 L -12,-4 L -8,-2 Z" />
      <!-- Staff/Umbrella held by guard -->
      <line x1="-12" y1="-30" x2="-12" y2="15" stroke="#d4af37" stroke-width="1.5" />
      <path d="M -16,-30 L -8,-30 L -12,-36 Z" />
    </g>

    <!-- Bearer 2 (Mid Right) -->
    <g transform="translate(195, 20)">
      <circle cx="0" cy="-24" r="5" />
      <path d="M -6,-26 C -6,-30 6,-30 6,-26 Z" />
      <path d="M -5,-18 L 5,-18 L 6,18 L 2,18 L 1,2 L -1,18 L -5,18 Z" />
      <!-- Hand holding pole -->
      <path d="M -4,-12 L -8,-4 L -6,-2 Z" />
    </g>

    <!-- Bearer 3 (Mid Left) -->
    <g transform="translate(45, 20)">
      <circle cx="0" cy="-24" r="5" />
      <path d="M -6,-26 C -6,-30 6,-30 6,-26 Z" />
      <path d="M -5,-18 L 5,-18 L 5,18 L 1,18 L 0,2 L -2,18 L -6,18 Z" />
      <!-- Hand holding pole -->
      <path d="M 4,-12 L 8,-4 L 6,-2 Z" />
    </g>

    <!-- Bearer 4 (Front Left - holding staff/trumpet) -->
    <g transform="translate(15, 20)">
      <circle cx="0" cy="-24" r="5" />
      <path d="M -6,-26 C -6,-30 6,-30 6,-26 Z" />
      <path d="M -5,-18 C -7,-18 7,-18 5,-18 L 8,12 L 4,12 L 2,0 L -1,18 L -5,18 L -3,0 L -5,12 L -9,12 Z" />
      <!-- Hand holding staff -->
      <path d="M 5,-12 L 12,-4 L 8,-2 Z" />
      <line x1="12" y1="-30" x2="12" y2="15" stroke="#d4af37" stroke-width="1.5" />
      <path d="M 8,-30 L 16,-30 L 12,-36 Z" />
    </g>
    
    <!-- Royal Guard / Herald at the very front -->
    <g transform="translate(-15, 18)">
      <circle cx="0" cy="-24" r="5" />
      <path d="M -6,-26 C -6,-30 6,-30 6,-26 Z" />
      <!-- Traditional Indian Attire (Sherwani skirt outline) -->
      <path d="M -5,-18 L 5,-18 L 8,5 L 12,18 L 6,18 L 3,5 L -1,18 L -7,18 L -5,5 Z" />
      <!-- Blow horn/trumpet (Shehnai) -->
      <path d="M 4,-20 C 10,-20 18,-15 22,-10 L 20,-8 C 16,-13 10,-18 4,-18 Z" />
      <path d="M 20,-11 L 24,-7 L 22,-5 L 18,-9 Z" />
    </g>
  </g>
</svg>
