<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard Console - WedEazzy</title>
  
  <!-- Font Awesome Icons & Stylesheets -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Modular Design stylesheets -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/templates.css">

  <style>
    /* ============================================
       WEDEAZZY ADMIN – PREMIUM HEADER REDESIGN
       Reference: Greeting + Clock + Partner ID
    ============================================ */

    /* WhatsApp circular green badges */
    .whatsapp-sidebar-icon {
      background-color: #25D366;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      font-size: 0.77rem !important;
      box-shadow: 0 2px 4px rgba(37, 211, 102, 0.2);
    }

    /* ---- HEADER CENTRE: Greeting Widget ---- */
    .header-greeting-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.25;
      user-select: none;
    }

    .header-greeting-top {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .header-greeting-emoji {
      font-size: 1.25rem;
      line-height: 1;
      display: inline-block;
      animation: floatEmoji 3s ease-in-out infinite;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-3px); }
    }

    .header-greeting-text {
      font-family: var(--font-head);
      font-size: 0.975rem;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
    }

    .header-greeting-sub {
      font-size: 0.73rem;
      font-weight: 400;
      color: var(--text-muted);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1px;
    }

    .header-greeting-sep {
      display: inline-block;
      width: 1px;
      height: 10px;
      background: var(--border-color);
      vertical-align: middle;
    }

    /* ---- HEADER RIGHT: Action Nodes ---- */
    .profile-dropdown-container {
      position: relative;
    }

    .profile-dropdown-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      background-color: var(--surface-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: 210px;
      box-shadow: 0 16px 32px -8px rgba(0,0,0,0.12), 0 4px 8px -2px rgba(0,0,0,0.06);
      display: none;
      flex-direction: column;
      padding: 6px 0;
      z-index: 80;
      animation: dropdownFade 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .profile-dropdown-menu.show {
      display: flex;
    }

    @keyframes dropdownFade {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    .dropdown-session-label {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .dropdown-session-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.2;
    }

    .dropdown-session-role {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .dropdown-menu-item {
      padding: 9px 16px;
      font-size: 0.8rem;
      color: var(--text-sub);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .dropdown-menu-item i {
      width: 14px;
      text-align: center;
      color: var(--text-muted);
    }

    .dropdown-menu-item:hover {
      background-color: var(--border-subtle);
      color: var(--text-main);
    }

    .dropdown-menu-item:hover i {
      color: var(--text-sub);
    }

    .dropdown-menu-item.logout {
      color: var(--brand-rose);
      border-top: 1px solid var(--border-subtle);
      margin-top: 4px;
    }

    .dropdown-menu-item.logout i {
      color: var(--brand-rose);
    }

    .dropdown-menu-item.logout:hover {
      background-color: rgba(244, 63, 94, 0.06);
    }

    /* ---- Header icon buttons (right side) ---- */
    .hdr-icon-btn {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--surface-bg);
      color: var(--text-sub);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }

    .hdr-icon-btn:hover {
      background-color: var(--border-subtle);
      border-color: var(--border-color);
      color: var(--text-main);
      transform: translateY(-1px);
    }

    /* Notification badge counter */
    .hdr-notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      padding: 0 3px;
      background: var(--brand-rose);
      border-radius: 99px;
      font-size: 0.55rem;
      font-weight: 800;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--surface-bg);
      line-height: 1;
      animation: pulseBadge 2s ease-in-out infinite;
    }

    @keyframes pulseBadge {
      0%, 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
      50%       { box-shadow: 0 0 0 4px rgba(244, 63, 94, 0); }
    }

    /* Admin avatar button (header) */
    .hdr-avatar-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand-rose), var(--brand-gold));
      color: white;
      font-weight: 700;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid var(--surface-bg);
      box-shadow: 0 0 0 1px var(--border-color), 0 2px 8px rgba(244,63,94,0.18);
      transition: all 0.18s ease;
      flex-shrink: 0;
    }

    .hdr-avatar-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px var(--brand-rose), 0 4px 12px rgba(244,63,94,0.25);
    }

    /* Sidebar toggle (left of header) */
    .hdr-toggle-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--surface-bg);
      color: var(--text-sub);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }

    .hdr-toggle-btn:hover {
      background-color: var(--border-subtle);
      color: var(--text-main);
      transform: translateY(-1px);
    }

    /* Separator dot between time and partner id */
    .hdr-divider-pipe {
      color: var(--border-color);
      font-weight: 300;
    }

    /* Header right cluster */
    .header-right-cluster {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Responsive tweaks */
    @media (max-width: 900px) {
      .header-greeting-sub .partner-id-segment {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .header-greeting-widget {
        align-items: flex-start;
      }
      .header-greeting-sub {
        font-size: 0.65rem;
      }
    }
  </style>
</head>

  <script>
    /**
     * WedEazzy Admin — Header Controller
     * Manages: greeting widget, live clock, partner ID, notifications, theme, profile dropdown
     */
    document.addEventListener("DOMContentLoaded", () => {

      /* ── Elements ── */
      const dropBtn        = document.getElementById("profileDropdownBtn");
      const dropMenu       = document.getElementById("profileDropdownMenu");
      const logoutBtn      = document.getElementById("dropdownLogoutBtn");
      const sidebarLogout  = document.getElementById("logoutBtn");
      const greetingEmoji  = document.getElementById("greetingEmoji");
      const greetingText   = document.getElementById("greetingText");
      const liveClock      = document.getElementById("headerLiveClock");
      const partnerIdEl    = document.getElementById("partnerIdValue");
      const dropAdminName  = document.getElementById("dropdownAdminName");

      /* ── Greeting + Emoji by time of day ── */
      function getGreeting() {
        const h = new Date().getHours();
        if (h >= 5  && h < 12) return { word: "Morning",   emoji: "☀️"  };
        if (h >= 12 && h < 17) return { word: "Afternoon", emoji: "🌤️" };
        if (h >= 17 && h < 21) return { word: "Evening",   emoji: "🌅"  };
        return                          { word: "Night",     emoji: "🌙"  };
      }

      function updateGreeting(adminName) {
        const { word, emoji } = getGreeting();
        const displayName = adminName || "Admin";
        if (greetingEmoji) greetingEmoji.textContent = emoji;
        if (greetingText)  greetingText.textContent  = `Good ${word}, ${displayName}`;
      }

      /* ── Live clock (HH:MM:SS AM/PM) ── */
      function tickClock() {
        const now  = new Date();
        let   hh   = now.getHours();
        const mm   = String(now.getMinutes()).padStart(2, "0");
        const ss   = String(now.getSeconds()).padStart(2, "0");
        const ampm = hh >= 12 ? "PM" : "AM";
        hh = hh % 12 || 12;
        if (liveClock) liveClock.textContent = `${String(hh).padStart(2, "0")}:${mm}:${ss} ${ampm}`;
      }
      tickClock();
      setInterval(tickClock, 1000);

      /* ── Session — pull name, avatar letter, partner ID ── */
      function applySession() {
        if (!window.WedEazzyAuth) return;
        const session = window.WedEazzyAuth.getSession();
        if (!session) return;

        const rawName  = session.name || session.email?.split("@")[0] || "Admin";
        const letter   = session.avatarLetter || rawName.charAt(0).toUpperCase();
        const partnerId = session.partnerId || session.id
                          || "cmq4zjw160003g1857qk3xbr6";

        // Avatar letter in button
        if (dropBtn)       dropBtn.textContent       = letter;
        // Dropdown name
        if (dropAdminName) dropAdminName.textContent = rawName;
        // Greeting text
        updateGreeting(rawName.charAt(0).toUpperCase() + rawName.slice(1));
        // Partner ID
        if (partnerIdEl)   partnerIdEl.textContent   = "#" + partnerId;
      }

      // Run immediately and also after store syncs
      applySession();
      updateGreeting(); // fallback before session loads
      window.addEventListener("wedeazzy_store_updated", applySession);

      /* ── Profile dropdown toggle ── */
      if (dropBtn && dropMenu) {
        dropBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const isOpen = dropMenu.classList.toggle("show");
          dropBtn.setAttribute("aria-expanded", isOpen);
        });

        document.addEventListener("click", (e) => {
          if (!dropBtn.contains(e.target) && !dropMenu.contains(e.target)) {
            dropMenu.classList.remove("show");
            dropBtn.setAttribute("aria-expanded", "false");
          }
        });

        // Close on Escape
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            dropMenu.classList.remove("show");
            dropBtn.setAttribute("aria-expanded", "false");
          }
        });
      }

      /* ── Logout handlers ── */
      function doLogout(e) {
        e.preventDefault();
        if (window.WedEazzyAuth) {
          if (window.showToast) window.showToast("Signing out securely...", "warning");
          setTimeout(() => window.WedEazzyAuth.logout(), 600);
        }
      }

      if (logoutBtn)     logoutBtn.addEventListener("click", doLogout);
      if (sidebarLogout) sidebarLogout.addEventListener("click", doLogout);

    });
  </script>
</body>
</html>
